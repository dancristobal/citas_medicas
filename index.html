<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citas Médicas & Google Calendar</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome para Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white border-b border-slate-100 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="bg-indigo-500 text-white p-2 rounded-xl shadow-md shadow-indigo-100">
                    <i class="fa-solid fa-heart-pulse text-xl"></i>
                </div>
                <span class="text-xl font-bold bg-gradient-to-r from-indigo-600 to-blue-600 bg-clip-text text-transparent">Citas Médicas</span>
            </div>
            <!-- Google Auth Buttons -->
            <div>
                <button id="btn-login" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-sm font-medium transition duration-200 flex items-center space-x-2 shadow-sm">
                    <i class="fa-brands fa-google"></i> <span>Conectar Google</span>
                </button>
                <button id="btn-logout" class="hidden bg-slate-200 hover:bg-slate-300 text-slate-700 px-4 py-2 rounded-xl text-sm font-medium transition duration-200">
                    <i class="fa-solid fa-arrow-right-from-bracket mr-1"></i> Cerrar Sesión
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- Formulario de Citas (Izquierda) -->
        <section class="lg:col-span-1">
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm sticky top-24">
                <h2 id="form-title" class="text-lg font-semibold text-slate-900 mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-calendar-plus text-indigo-500"></i> Agendar Nueva Cita
                </h2>
                
                <form id="appointment-form" class="space-y-4">
                    <input type="hidden" id="appointment-id">
                    <input type="hidden" id="gcal-event-id">

                    <!-- Descripción -->
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Descripción de la Cita</label>
                        <input type="text" id="desc" required placeholder="Ej. Consulta Dentista, Revisión General..." class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-indigo-500 text-sm transition">
                    </div>

                    <!-- Fecha y Hora -->
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Fecha</label>
                            <input type="date" id="date" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-indigo-500 text-sm transition">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Hora</label>
                            <input type="time" id="time" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-indigo-500 text-sm transition">
                        </div>
                    </div>

                    <!-- Notificaciones Múltiples -->
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Notificaciones</label>
                        <div class="flex gap-2 mb-2">
                            <input type="number" id="notify-value" min="1" value="30" class="w-20 px-3 py-2 rounded-xl border border-slate-200 text-sm focus:outline-none focus:border-indigo-500">
                            <select id="notify-type" class="flex-1 px-3 py-2 rounded-xl border border-slate-200 text-sm bg-white focus:outline-none focus:border-indigo-500">
                                <option value="minutes">Minutos antes</option>
                                <option value="hours">Horas antes</option>
                                <option value="days">Días antes</option>
                            </select>
                            <button type="button" id="btn-add-notification" class="bg-slate-100 hover:bg-indigo-50 text-indigo-600 px-3 rounded-xl transition">
                                <i class="fa-solid fa-plus"></i>
                            </button>
                        </div>
                        <!-- Lista de recordatorios agregados -->
                        <div id="notifications-list" class="flex flex-wrap gap-1.5 min-h-[32px] p-1 bg-slate-50 rounded-xl border border-dashed border-slate-200">
                            <!-- Tags dinámicos -->
                        </div>
                    </div>

                    <!-- Botones de Acción Obligatorios -->
                    <div class="pt-2 space-y-2">
                        <button type="submit" id="btn-create" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-xl text-sm transition duration-200 shadow-md shadow-indigo-100 flex justify-center items-center gap-2">
                            <i class="fa-solid fa-circle-check"></i> Crear Cita
                        </button>
                        <div id="edit-actions" class="hidden space-y-2">
                            <button type="button" id="btn-update" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 rounded-xl text-sm transition duration-200 flex justify-center items-center gap-2">
                                <i class="fa-solid fa-pen-to-square"></i> Modificar Cita
                            </button>
                            <button type="button" id="btn-delete" class="w-full bg-rose-500 hover:bg-rose-600 text-white font-medium py-2.5 rounded-xl text-sm transition duration-200 flex justify-center items-center gap-2">
                                <i class="fa-solid fa-trash-can"></i> Eliminar Cita
                            </button>
                            <button type="button" id="btn-cancel-edit" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-500 font-medium py-2 rounded-xl text-xs transition text-center">
                                Cancelar Edición
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </section>

        <!-- Calendario y Tarjetas de Citas (Derecha) -->
        <section class="lg:col-span-2 space-y-6">
            <!-- Calendario Mensual -->
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                <div class="flex items-center justify-between mb-4">
                    <h2 id="calendar-month-year" class="text-lg font-semibold text-slate-900 capitalize">Mes Año</h2>
                    <div class="flex space-x-1">
                        <button id="prev-month" class="p-2 text-slate-600 hover:bg-slate-50 rounded-lg transition"><i class="fa-solid fa-chevron-left"></i></button>
                        <button id="next-month" class="p-2 text-slate-600 hover:bg-slate-50 rounded-lg transition"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                </div>
                <!-- Grid de Días de la semana -->
                <div class="grid grid-cols-7 gap-1 text-center text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">
                    <div>Dom</div><div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div>
                </div>
                <!-- Grid de los días del mes -->
                <div id="calendar-grid" class="grid grid-cols-7 gap-1 text-sm">
                    <!-- Dinámico -->
                </div>
            </div>

            <!-- Listado de próximas citas en formato Tarjetas -->
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                <h3 class="text-lg font-bold text-slate-800">Tus Citas Programadas</h3>
                
                <!-- BOTONES DE FILTRADO TIPO PESTAÑA -->
                <div class="flex bg-slate-100 p-1 rounded-xl shadow-sm border border-slate-200/50 self-start sm:self-auto">
                    <button id="btn-filter-proximas" onclick="cambiarFiltroCitas('proximas')" 
                        class="px-3 py-1.5 text-xs font-semibold rounded-lg transition duration-200 bg-white text-indigo-600 shadow-sm">
                        📅 Próximas
                    </button>
                    <button id="btn-filter-pasadas" onclick="cambiarFiltroCitas('pasadas')" 
                        class="px-3 py-1.5 text-xs font-semibold rounded-lg transition duration-200 text-slate-600 hover:text-slate-800">
                        ⌛ Pasadas
                    </button>
                    <button id="btn-filter-todas" onclick="cambiarFiltroCitas('todas')" 
                        class="px-3 py-1.5 text-xs font-semibold rounded-lg transition duration-200 text-slate-600 hover:text-slate-800">
                        ✨ Todas
                    </button>
                </div>
            </div>

            <!-- 🚀 ¡AQUÍ! Asegúrate de que el div contenedor tenga exactamente id="cards-container" -->
            <div id="cards-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Las tarjetas se generarán dinámicamente aquí dentro -->
            </div>
        </section>

    </main>

    <script>
        // CONFIGURACIÓN DE CREDENCIALES GOOGLE (Reemplaza con tus datos reales)
        const CLIENT_ID = '88055812670-o3vspk5bm5kdt3a6juuq07c183assjih.apps.googleusercontent.com';
        const API_KEY = 'AIzaSyA2tS4DMO7Ci2Kd3gvKELgpq3UGtaj34ec';

        let gapiInited = false;

let filtroCitasActual = 'proximas';

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            if (!container) return;

            const variants = {
                success: {
                    icon: 'fa-circle-check',
                    accent: 'border-emerald-200',
                    iconBg: 'bg-emerald-500',
                    title: 'text-emerald-700'
                },
                error: {
                    icon: 'fa-triangle-exclamation',
                    accent: 'border-rose-200',
                    iconBg: 'bg-rose-500',
                    title: 'text-rose-700'
                },
                warning: {
                    icon: 'fa-circle-exclamation',
                    accent: 'border-amber-200',
                    iconBg: 'bg-amber-500',
                    title: 'text-amber-700'
                },
                info: {
                    icon: 'fa-circle-info',
                    accent: 'border-slate-200',
                    iconBg: 'bg-slate-600',
                    title: 'text-slate-700'
                }
            };

            const variant = variants[type] || variants.info;
            const toast = document.createElement('div');
            toast.className = `pointer-events-auto flex items-start gap-3 rounded-2xl border ${variant.accent} bg-white px-4 py-3 shadow-lg shadow-slate-200/60 transition-all duration-200 opacity-0 translate-y-2 scale-95`;
            toast.innerHTML = `
                <div class="mt-0.5 flex h-8 w-8 shrink-0 items-center justify-center rounded-full ${variant.iconBg} text-white">
                    <i class="fa-solid ${variant.icon}"></i>
                </div>
                <div class="min-w-0 flex-1">
                    <p class="text-sm font-medium ${variant.title}">${message}</p>
                </div>
                <button type="button" class="text-slate-400 hover:text-slate-600 transition" aria-label="Cerrar notificación">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            `;

            const closeButton = toast.querySelector('button');
            const removeToast = () => {
                toast.classList.add('opacity-0', 'translate-y-2', 'scale-95');
                window.setTimeout(() => toast.remove(), 180);
            };

            closeButton.onclick = removeToast;
            container.appendChild(toast);
            window.requestAnimationFrame(() => {
                toast.classList.remove('opacity-0', 'translate-y-2', 'scale-95');
            });
            window.setTimeout(removeToast, type === 'error' ? 6000 : 3500);
        }

        // Muestra un diálogo de confirmación centrado con overlay oscuro
        function showConfirm(message) {
            return new Promise((resolve) => {
                const overlay = document.createElement('div');
                overlay.className = 'fixed inset-0 z-[10000] flex items-center justify-center bg-slate-950/60 backdrop-blur-sm p-4';
                overlay.innerHTML = `
                    <div class="w-full max-w-md rounded-3xl border border-slate-200 bg-white shadow-2xl shadow-slate-950/30 overflow-hidden">
                        <div class="flex items-start gap-4 p-6">
                            <div class="flex h-12 w-12 shrink-0 items-center justify-center rounded-2xl bg-rose-500 text-white shadow-lg shadow-rose-200">
                                <i class="fa-solid fa-triangle-exclamation text-lg"></i>
                            </div>
                            <div class="min-w-0 flex-1">
                                <h3 class="text-lg font-semibold text-slate-900">Confirmar eliminación</h3>
                                <p class="mt-1 text-sm leading-6 text-slate-600">${message}</p>
                            </div>
                        </div>
                        <div class="flex items-center justify-end gap-3 border-t border-slate-100 bg-slate-50 px-6 py-4">
                            <button type="button" class="px-4 py-2 rounded-xl bg-white text-slate-700 border border-slate-200 text-sm font-medium shadow-sm hover:bg-slate-50 btn-cancel">Cancelar</button>
                            <button type="button" class="px-4 py-2 rounded-xl bg-rose-600 text-white text-sm font-semibold shadow-sm hover:bg-rose-700 btn-confirm">Eliminar</button>
                        </div>
                    </div>
                `;

                const btnCancel = overlay.querySelector('.btn-cancel');
                const btnConfirm = overlay.querySelector('.btn-confirm');

                const cleanup = (result) => {
                    overlay.remove();
                    document.removeEventListener('keydown', handleKeydown);
                    resolve(result);
                };

                const handleKeydown = (event) => {
                    if (event.key === 'Escape') {
                        cleanup(false);
                    }
                };

                btnCancel.onclick = () => cleanup(false);
                btnConfirm.onclick = () => cleanup(true);
                overlay.addEventListener('click', (event) => {
                    if (event.target === overlay) cleanup(false);
                });

                document.addEventListener('keydown', handleKeydown);
                document.body.appendChild(overlay);
                btnConfirm.focus();
            });
        }

        // --- AUTENTICACIÓN GOOGLE IDENTITY SERVICES ---

        // 1. Inicializar GAPI Client
        function gapiLoaded() {
            gapi.load('client', async () => {
                try {
                    await gapi.client.init({
                        apiKey: API_KEY,
                        discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest']
                    });
                    gapiInited = true;
                    maybeEnableAuth();
                } catch (error) {
                    console.error("Error inicializando GAPI Client:", error);
                }
            });
        }

   
// 2. Inicializar GIS (Sin la restricción de texto)
        function gisLoaded() {
            try {
                // Eliminamos la alerta del "TU_CLIENT_ID" para que use lo que sea que tenga la variable
                console.log("Intentando inicializar con las credenciales actuales...");

                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID, // Usará el valor directo de la constante arriba declarada
                    scope: SCOPES,
                    error_callback: (err) => {
                        showToast("Google emitió un error de configuración: " + JSON.stringify(err), 'error');
                        console.error("Error detallado:", err);
                    },
                    callback: (resp) => {
                        if (resp.error) {
                            console.error("Error en respuesta de autenticación:", resp.error);
                            return;
                        }
                        localStorage.setItem('gcal_token', resp.access_token);
                        updateAuthUI(true);
                    },
                });

                if (tokenClient) {
                    console.log("tokenClient creado con éxito en memoria.");
                    gisInited = true;
                    maybeEnableAuth();
                }

            } catch (error) {
                console.error("Error crítico al inicializar Google Identity Client:", error);
            }
        }

        function maybeEnableAuth() {
            if (gapiInited && gisInited) {
                const token = localStorage.getItem('gcal_token');
                if (token) {
                    gapi.client.setToken({ access_token: token });
                    updateAuthUI(true);
                }
            }
        }

        // Evento Seguro para el Botón Conectar Google
        btnLogin.onclick = () => {
            if (!tokenClient) {
                showToast("El servicio de Google aún está cargando o las credenciales CLIENT_ID son incorrectas. Revisa la consola del navegador (F12).", 'warning');
                return;
            }
            
            if (gapi.client.getToken() === null) {
                tokenClient.requestAccessToken({ prompt: 'consent' });
            } else {
                tokenClient.requestAccessToken({ prompt: '' });
            }
        };

        btnLogout.onclick = () => {
            const token = gapi.client.getToken();
            if (token !== null) {
                google.accounts.oauth2.revoke(token.access_token, () => {});
                gapi.client.setToken(null);
                localStorage.removeItem('gcal_token');
                localStorage.removeItem('med_appointments');
                localAppointments = [];
                currentReminders = [];
                resetForm();
                renderCalendar();
                renderCards();
                updateAuthUI(false);
            }
        };

        function updateAuthUI(isAuthenticated) {
            if (isAuthenticated) {
                if (btnLogin) btnLogin.classList.add('hidden');
                if (btnLogout) btnLogout.classList.remove('hidden');
                
                // 🚀 ¡AQUÍ! Si está autenticado, descargamos inmediatamente los eventos reales
                listUpcomingEvents();
                
            } else {
                if (btnLogin) btnLogin.classList.remove('hidden');
                if (btnLogout) btnLogout.classList.add('hidden');
            }
        }

        function checkGoogleAuth() {
            if (!gapi.client.getToken()) {
                showToast("Por favor, conéctate a tu cuenta de Google primero usando el botón de 'Conectar Google' arriba a la derecha.", 'warning');
                return false;
            }
            return true;
        }

        // --- LÓGICA DE LA APLICACIÓN (CITAS, CALENDARIO Y TARJETAS) ---

        // Recordatorios múltiples en el cliente
        document.getElementById('btn-add-notification').onclick = () => {
            const val = parseInt(document.getElementById('notify-value').value);
            const type = document.getElementById('notify-type').value;
            if(!val || val < 1) return;

            let minutes = val;
            if (type === 'hours') minutes = val * 60;
            if (type === 'days') minutes = val * 1440;

            if(!currentReminders.some(r => r.minutes === minutes)) {
                currentReminders.push({ minutes, label: `${val} ${type === 'minutes' ? 'min' : type === 'hours' ? 'hr(s)' : 'día(s)'}` });
                renderReminders();
            }
        };

        function renderReminders() {
            notificationsList.innerHTML = currentReminders.map((r, index) => `
                <span class="inline-flex items-center bg-indigo-50 text-indigo-700 text-xs px-2.5 py-1 rounded-lg font-medium border border-indigo-100">
                    <i class="fa-solid fa-bell mr-1.5 opacity-70"></i> ${r.label}
                    <button type="button" onclick="removeReminder(${index})" class="ml-1.5 text-indigo-400 hover:text-indigo-800"><i class="fa-solid fa-xmark"></i></button>
                </span>
            `).join('');
        }
        window.removeReminder = (index) => { currentReminders.splice(index, 1); renderReminders(); };

        function saveAndRefresh() {
            localStorage.setItem('med_appointments', JSON.stringify(localAppointments));
            renderCalendar();
            renderCards();
            resetForm();
        }

  // BOTÓN ACCIÓN: CREAR CITA (Versión de diagnóstico de errores)
// BOTÓN ACCIÓN: CREAR CITA (Corregido el error de rango de tiempo 400)
        form.onsubmit = async (e) => {
            e.preventDefault();
            if (document.getElementById('appointment-id').value) return; 
            if (!checkGoogleAuth()) return;

            const summary = document.getElementById('desc').value;
            const date = document.getElementById('date').value; // Formato: YYYY-MM-DD
            const time = document.getElementById('time').value; // Formato: HH:MM

            // 1. Definir Hora de Inicio de forma limpia
            const startDateTime = `${date}T${time}:00`;

            // 2. Calcular Hora de Fin sumando exactamente 30 minutos de forma segura
            const startJsDate = new Date(`${date}T${time}`);
            const endJsDate = new Date(startJsDate.getTime() + 30 * 60000); // +30 mins
            
            const endHours = String(endJsDate.getHours()).padStart(2, '0');
            const endMinutes = String(endJsDate.getMinutes()).padStart(2, '0');
            const endDateTime = `${date}T${endHours}:${endMinutes}:00`;

            const gcalReminders = currentReminders.map(r => ({ method: 'popup', minutes: r.minutes }));

            // 3. Estructurar el evento para Google Calendar
            const event = {
                'summary': summary,
                'description': 'Creado desde App Citas Médicas',
                'start': { 
                    'dateTime': startDateTime, 
                    'timeZone': Intl.DateTimeFormat().resolvedOptions().timeZone 
                },
                'end': { 
                    'dateTime': endDateTime, 
                    'timeZone': Intl.DateTimeFormat().resolvedOptions().timeZone 
                },
                'reminders': { 
                    'useDefault': false, 
                    'overrides': gcalReminders 
                }
            };

            try {
                const response = await gapi.client.calendar.events.insert({ 'calendarId': 'primary', 'resource': event });
                const newApp = {
                    id: Date.now().toString(),
                    gcalId: response.result.id,
                    summary, date, time,
                    reminders: [...currentReminders]
                };
                localAppointments.push(newApp);
                saveAndRefresh();
                showToast("¡Cita creada con éxito en la App y sincronizada en tu Google Calendar!", 'success');
            } catch (err) {
                console.error("Error devuelto por Google Calendar API:", err);
                showToast("Error de Google Calendar: " + JSON.stringify(err.result || err), 'error');
            }
        };

// BOTÓN ACCIÓN: MODIFICAR/ACTUALIZAR CITA (Corregido y con Diagnóstico)

// BOTÓN ACCIÓN: MODIFICAR/ACTUALIZAR CITA (Versión Blindada contra errores de ID)
        document.getElementById('btn-update').onclick = async () => {
            if (!checkGoogleAuth()) return;
            
            const id = document.getElementById('appointment-id').value;
            const gcalId = document.getElementById('gcal-event-id').value;

            if (!gcalId || gcalId === 'undefined' || gcalId === 'null') {
                showToast("Error local: Esta cita no tiene un ID de Google Calendar válido.", 'error');
                return;
            }

            const summary = document.getElementById('desc').value;
            const date = document.getElementById('date').value;
            const time = document.getElementById('time').value;
            
            // 1. Formateo seguro de tiempos (Rango de 30 minutos locales)
            const startDateTime = `${date}T${time}:00`;
            const startJsDate = new Date(`${date}T${time}`);
            const endJsDate = new Date(startJsDate.getTime() + 30 * 60000);
            
            const endHours = String(endJsDate.getHours()).padStart(2, '0');
            const endMinutes = String(endJsDate.getMinutes()).padStart(2, '0');
            const endDateTime = `${date}T${endHours}:${endMinutes}:00`;

            const gcalReminders = currentReminders.map(r => ({ method: 'popup', minutes: r.minutes }));

            // 2. Estructura del evento con el color verde ('10')
            const event = {
                'summary': summary,
                'colorId': '10', 
                'start': { 
                    'dateTime': startDateTime, 
                    'timeZone': Intl.DateTimeFormat().resolvedOptions().timeZone 
                },
                'end': { 
                    'dateTime': endDateTime, 
                    'timeZone': Intl.DateTimeFormat().resolvedOptions().timeZone 
                },
                'reminders': { 
                    'useDefault': false, 
                    'overrides': gcalReminders 
                }
            };

            // Función interna protegida para limpiar la interfaz tras el éxito
            const finalizarModificacionExitosa = () => {
                const index = localAppointments.findIndex(a => a.id === id);
                if (index !== -1) {
                    localAppointments[index] = { 
                        id, 
                        gcalId: gcalId, 
                        summary, 
                        date, 
                        time, 
                        reminders: [...currentReminders] 
                    };
                }
                
                saveAndRefresh();
                
                // Tratamiento seguro del Formulario
                if(form) form.reset();
                
                const inputAppId = document.getElementById('appointment-id');
                const inputGcalId = document.getElementById('gcal-event-id');
                if(inputAppId) inputAppId.value = '';
                if(inputGcalId) inputGcalId.value = '';

                // 🛡️ CONTROL BLINDADO: Evitamos el 'Cannot read properties of null' verificando si existen
                const bSave = document.getElementById('btn-save');
                const bUpdate = document.getElementById('btn-update');
                const bDelete = document.getElementById('btn-delete');

                if (bSave) bSave.classList.remove('hidden');
                if (bUpdate) bUpdate.classList.add('hidden');
                if (bDelete) bDelete.classList.add('hidden');

                currentReminders = [];
                // Verificamos también que exista la función de renderizado de recordatorios
                if (typeof renderReminders === "function") {
                    renderReminders();
                }

                // 🚀 ¡MENSAJE DE ÉXITO MENSAJE GARANTIZADO!
                showToast("¡Cita modificada con éxito!", 'success');
            };

            try {
                console.log(`Intentando actualizar en Google el evento con ID: ${gcalId}`);
                
                // Ejecutar la actualización en Google Calendar
                await gapi.client.calendar.events.patch({ 
                    'calendarId': 'primary', 
                    'eventId': gcalId, 
                    'resource': event 
                });

                finalizarModificacionExitosa();

            } catch (err) {
                const esObjetoVacio = !err || (err.result && Object.keys(err.result).length === 0) || JSON.stringify(err) === '{}';
                
                if (esObjetoVacio) {
                    finalizarModificacionExitosa();
                } else {
                    console.error("Error real detectado en la API:", err);
                    showToast("Error de Google Calendar al actualizar: " + JSON.stringify(err.result || err), 'error');
                }
            }
        };


        // BOTÓN ACCIÓN: ELIMINAR CITA
        document.getElementById('btn-delete').onclick = async () => {
            if (!checkGoogleAuth()) return;
            const confirmar = await showConfirm("¿Estás seguro de que deseas eliminar esta cita de la App y de Google Calendar?");
            if (!confirmar) return;
            const id = document.getElementById('appointment-id').value;
            const gcalId = document.getElementById('gcal-event-id').value;

            try {
                await gapi.client.calendar.events.delete({ 'calendarId': 'primary', 'eventId': gcalId });
                localAppointments = localAppointments.filter(a => a.id !== id);
                saveAndRefresh();
            } catch (err) {
                console.error(err);
                showToast("Error al borrar de Google Calendar. Se removerá localmente.", 'warning');
                localAppointments = localAppointments.filter(a => a.id !== id);
                saveAndRefresh();
            }
        };

        // Pasar tarjeta al estado de edición en el formulario
        window.initEdit = (id) => {
            const app = localAppointments.find(a => a.id === id);
            if(!app) return;

            document.getElementById('appointment-id').value = app.id;
            document.getElementById('gcal-event-id').value = app.gcalId;
            document.getElementById('desc').value = app.summary;
            document.getElementById('date').value = app.date;
            document.getElementById('time').value = app.time;
            currentReminders = [...app.reminders];
            renderReminders();

            document.getElementById('btn-create').classList.add('hidden');
            // Asegurar que los botones individuales estén visibles y habilitados
            const bUpdate = document.getElementById('btn-update');
            const bDelete = document.getElementById('btn-delete');
            if (bUpdate) { bUpdate.classList.remove('hidden'); bUpdate.disabled = false; }
            if (bDelete) { bDelete.classList.remove('hidden'); bDelete.disabled = false; }
            document.getElementById('edit-actions').classList.remove('hidden');
            document.getElementById('form-title').innerHTML = `<i class="fa-solid fa-user-doctor text-emerald-500"></i> Modificar Cita`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        document.getElementById('btn-cancel-edit').onclick = resetForm;

        function resetForm() {
            form.reset();
            document.getElementById('appointment-id').value = '';
            document.getElementById('gcal-event-id').value = '';
            currentReminders = [];
            notificationsList.innerHTML = '';
            document.getElementById('btn-create').classList.remove('hidden');
            document.getElementById('edit-actions').classList.add('hidden');
            document.getElementById('form-title').innerHTML = `<i class="fa-solid fa-calendar-plus text-indigo-500"></i> Agendar Nueva Cita`;
        }

        // Al pinchar en un día del calendario sin citas, rellena la fecha y scroll al formulario
        window.selectDateForNewAppointment = (dateStr) => {
            // Verificar si el día tiene citas (buscando en el DOM si hay eventos)
            const dayAppointments = localAppointments.filter(a => a.date === dateStr);
            
            // Siempre rellenar la fecha y preparar el formulario para nueva cita
            resetForm();
            document.getElementById('date').value = dateStr;
            
            // Scroll suave hacia el formulario
            const formSection = document.querySelector('section.lg\\:col-span-1');
            if (formSection) {
                formSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
            
            // Enfocar el campo descripción para facilitar la entrada
            setTimeout(() => {
                document.getElementById('desc').focus();
            }, 400);
        };

        // --- INTERFAZ GRÁFICA: CALENDARIO Y TARJETAS ---

        function renderCalendar() {
            const year = currentMonthDate.getFullYear();
            const month = currentMonthDate.getMonth();
            const firstDayIndex = new Date(year, month, 1).getDay();
            const lastDay = new Date(year, month + 1, 0).getDate();
            const monthsNames = ["enero", "febrero", "marzo", "abril", "mayo", "junio", "julio", "agosto", "septiembre", "octubre", "noviembre", "diciembre"];
            
            document.getElementById('calendar-month-year').innerText = `${monthsNames[month]} ${year}`;
            let daysHtml = "";
            
            // Obtener la fecha y hora exacta de este preciso instante
            const ahora = new Date();
            
            for (let i = 0; i < firstDayIndex; i++) {
                daysHtml += `<div class="p-2 border border-slate-100 min-h-[90px] bg-slate-50/50"></div>`;
            }

            for (let day = 1; day <= lastDay; day++) {
                const dayStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                const isToday = new Date().toDateString() === new Date(year, month, day).toDateString();
                const dayAppointments = localAppointments.filter(a => a.date === dayStr);

                dayAppointments.sort((a, b) => a.time.localeCompare(b.time));

                let eventsHtml = "";
                if (dayAppointments.length > 0) {
                    eventsHtml = `<div class="w-full space-y-1 mt-1 max-h-[60px] overflow-y-auto pr-0.5">`;
                    dayAppointments.forEach(app => {
                        // COMPARACIÓN: Creamos el objeto fecha de la cita para saber si ya pasó
                        const fechaCita = new Date(`${app.date}T${app.time}`);
                        const esPasada = fechaCita < ahora;

                        // Definimos las clases de Tailwind según el estado
                        const clasesEstilo = esPasada 
                            ? "bg-slate-200 hover:bg-slate-300 text-slate-500 opacity-65 italic line-through decoration-slate-400" 
                            : "bg-emerald-500 hover:bg-emerald-600 text-white font-medium";

                        eventsHtml += `
                            <div onclick="event.stopPropagation(); initEdit('${app.id}')" 
                                 class="${clasesEstilo} text-[10px] p-1 rounded-md shadow-sm truncate cursor-pointer transition flex flex-col leading-tight select-none"
                                 title="${app.summary} ${esPasada ? '(Pasada)' : ''}">
                                <span class="${esPasada ? 'text-slate-500' : 'font-bold opacity-90'}">${app.time}</span>
                                <span class="truncate">${app.summary}</span>
                            </div>
                        `;
                    });
                    eventsHtml += `</div>`;
                }

                const hasAppointments = dayAppointments.length > 0;
                const cellDateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

                daysHtml += `
                    <div onclick="selectDateForNewAppointment('${cellDateStr}')" class="p-1.5 border border-slate-100 rounded-xl flex flex-col justify-between min-h-[95px] transition-all cursor-pointer ${isToday ? 'bg-indigo-50/40 ring-1 ring-indigo-200' : 'hover:bg-slate-50/80 bg-white'}">
                        <div class="flex justify-between items-center w-full">
                            <span class="text-xs font-semibold ${isToday ? 'bg-indigo-600 text-white w-5 h-5 flex items-center justify-center rounded-full shadow-sm shadow-indigo-200' : 'text-slate-700'}">${day}</span>
                        </div>
                        ${eventsHtml}
                    </div>
                `;
            }
            document.getElementById('calendar-grid').innerHTML = daysHtml;
        }

// INTERFAZ GRÁFICA: TARJETAS DE CITAS (Con botón de borrar en citas pasadas)
// INTERFAZ GRÁFICA: TARJETAS DE CITAS (Actualizado para Botones)
// INTERFAZ GRÁFICA: TARJETAS DE CITAS (Solución total de renderizado)

        function renderCards() {
            // Buscamos estrictamente el ID que acabamos de asignar en el HTML
            const contenedor = document.getElementById('cards-container');
            
            if (!contenedor) {
                console.error("Error crítico: No se encontró el contenedor HTML 'cards-container'.");
                return;
            }

            // 1. Localizar de forma segura el contenedor de las tarjetas
            // Buscamos por los 4 IDs más comunes que suelen usarse en estos proyectos
 /*            const contenedor = document.getElementById('cards-container') || 
                               document.getElementById('cardsContainer') || 
                               document.getElementById('appointment-list') || 
                               (typeof cardsContainer !== 'undefined' ? cardsContainer : null);
            
            if (!contenedor) {
                console.error("Error crítico: No se encontró el contenedor HTML para renderizar las tarjetas de citas.");
                return;
            } */

            // 2. Leer el filtro activo (Por defecto si no está definido: proximas)
            const filtroActivo = typeof filtroCitasActual !== 'undefined' ? filtroCitasActual : 'proximas';

            // 3. Ordenar todas las citas cronológicamente
            const sorted = [...localAppointments].sort((a,b) => new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`));
            const ahora = new Date();

            // 4. Aplicar el filtro según el botón seleccionado
            const citasFiltradas = sorted.filter(app => {
                const fechaCita = new Date(`${app.date}T${app.time}`);
                const esPasada = fechaCita < ahora;

                if (filtroActivo === 'proximas') return !esPasada;
                if (filtroActivo === 'pasadas') return esPasada;
                return true; // Mostrar todas
            });

            // 5. Mensaje si la lista queda vacía tras filtrar
            if (citasFiltradas.length === 0) {
                let mensaje = "No tienes citas programadas.";
                if (filtroActivo === 'pasadas') mensaje = "No tienes un historial de citas pasadas.";
                if (filtroActivo === 'proximas') mensaje = "No tienes citas próximas pendientes.";

                contenedor.innerHTML = `
                    <div class="col-span-full bg-white p-8 text-center rounded-2xl border border-slate-100 text-slate-400 w-full">
                        <i class="fa-solid fa-calendar-day text-3xl mb-2 text-slate-300"></i>
                        <p class="text-sm">${mensaje}</p>
                    </div>`;
                return;
            }

// 6. Inyectar las tarjetas correspondientes con contraste mejorado
// 6. Inyectar las tarjetas correspondientes con contraste mejorado
            contenedor.innerHTML = citasFiltradas.map(app => {
                const fechaCita = new Date(`${app.date}T${app.time}`);
                const esPasada = fechaCita < ahora;
                const googleEventId = app.gcalId || app.gCalId || '';
                const tituloClases = esPasada ? 'text-rose-700 line-through decoration-rose-400' : 'text-emerald-700';
                const metaClases = esPasada ? 'text-rose-600' : 'text-emerald-600';
                const iconoClases = esPasada ? 'text-rose-500' : 'text-emerald-500';

                return `
                    <!-- Tarjeta: Ajustada opacidad y borde punteado si es pasada -->
                    <div class="bg-white p-5 rounded-2xl border-2 shadow-sm hover:shadow-md transition duration-200 flex flex-col justify-between group 
                        ${esPasada ? 'opacity-65 bg-slate-50 border-rose-500' : 'border-emerald-500'}">
                        <div>
                            <div class="flex justify-between items-start gap-3 mb-2">
                                <!-- Título: Ahora es text-slate-500 en pasadas (más oscuro y legible) con línea de tachado -->
                                <h4 class="font-semibold text-sm md:text-base ${tituloClases}">
                                    ${app.summary}
                                </h4>
                                
                                ${esPasada ? `
                                    <div class="flex items-center gap-2">
                                        <!-- Etiqueta Pasada: Gris un poco más oscuro para mejor contraste -->
                                        <span class="text-[10px] bg-rose-100 text-rose-700 px-2 py-0.5 rounded-full font-bold flex items-center gap-1 whitespace-nowrap">
                                            <i class="fa-solid fa-check text-[9px]"></i> Pasada
                                        </span>
                                        <button onclick="event.stopPropagation(); ejecutarBorrado('${app.id}', '${googleEventId}')" 
                                                class="text-slate-400 hover:text-rose-600 p-1 transition text-xs" 
                                                title="Eliminar del historial">
                                            <i class="fa-solid fa-trash"></i>
                                        </button>
                                    </div>
                                ` : `
                                    <button onclick="initEdit('${app.id}')" class="opacity-0 group-hover:opacity-100 text-slate-400 hover:text-indigo-600 p-1 transition text-xs flex items-center gap-1">
                                        <i class="fa-solid fa-pencil"></i> Gestionar
                                    </button>
                                `}
                            </div>
                            
                            <!-- Fecha y Hora: Subido el tono del texto a text-slate-600 si es pasada -->
                            <div class="space-y-1 text-xs mb-3 ${metaClases}">
                                <div class="flex items-center gap-1.5">
                                    <i class="fa-regular fa-calendar ${iconoClases}"></i> 
                                    ${app.date.split('-').reverse().join('/')}
                                </div>
                                <div class="flex items-center gap-1.5">
                                    <i class="fa-regular fa-clock ${iconoClases}"></i> 
                                    ${app.time} hs
                                </div>
                            </div>
                        </div>
                        ${app.reminders && app.reminders.length > 0 && !esPasada ? `
                            <div class="flex flex-wrap gap-1 border-t border-slate-50 pt-2">
                                ${app.reminders.map(r => `<span class="text-[10px] bg-slate-50 text-slate-600 px-1.5 py-0.5 rounded-md"><i class="fa-solid fa-bell text-slate-300 mr-0.5"></i> ${r.label}</span>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }
        
        document.getElementById('prev-month').onclick = () => { currentMonthDate.setMonth(currentMonthDate.getMonth() - 1); renderCalendar(); };
        document.getElementById('next-month').onclick = () => { currentMonthDate.setMonth(currentMonthDate.getMonth() + 1); renderCalendar(); };


// CONTROLADOR: Cambiar de pestaña y refrescar estilos visuales
function cambiarFiltroCitas(nuevoFiltro) {
    filtroCitasActual = nuevoFiltro;
    
    const btnProximas = document.getElementById('btn-filter-proximas');
    const btnPasadas = document.getElementById('btn-filter-pasadas');
    const btnTodas = document.getElementById('btn-filter-todas');
    
    // Lista de todos los botones para iterar
    const botones = [
        { el: btnProximas, id: 'proximas' },
        { el: btnPasadas, id: 'pasadas' },
        { el: btnTodas, id: 'todas' }
    ];
    
    botones.forEach(btn => {
        if (!btn.el) return;
        if (btn.id === nuevoFiltro) {
            // Estilo del botón ACTIVO (Fondo blanco, texto índigo y sombreado)
            btn.el.className = "px-3 py-1.5 text-xs font-semibold rounded-lg transition duration-200 bg-white text-indigo-600 shadow-sm";
        } else {
            // Estilo del botón INACTIVO (Transparente, texto gris suave)
            btn.el.className = "px-3 py-1.5 text-xs font-semibold rounded-lg transition duration-200 text-slate-600 hover:text-slate-800";
        }
    });
    
    // Volver a pintar las tarjetas aplicando el nuevo filtro
    renderCards();
}


// API GOOGLE: Listar y descargar eventos desde Google Calendar
        async function listUpcomingEvents() {
            try {
                console.log("Descargando eventos desde Google Calendar...");
                
                // Pedimos los eventos desde el inicio del año actual hasta el futuro
                const response = await gapi.client.calendar.events.list({
                    'calendarId': 'primary',
                    'timeMin': (new Date(new Date().getFullYear(), 0, 1)).toISOString(), // 1 de Enero de este año
                    'showDeleted': false,
                    'singleEvents': true, // Expande eventos recurrentes en citas individuales
                    'orderBy': 'startTime'
                });

                const events = response.result.items;
                if (!events || events.length === 0) {
                    console.log("No se encontraron eventos en Google Calendar.");
                    return;
                }

                // Procesar y transformar los eventos de Google al formato de tu App
                const googleAppointments = events.map(event => {
                    // Google maneja dateTime (2026-05-17T18:00:00) o date (2026-05-17) para todo el día
                    const startRaw = event.start.dateTime || event.start.date;
                    if (!startRaw) return null;

                    // Separar fecha (YYYY-MM-DD) y hora (HH:MM)
                    const [date, fullTime] = startRaw.split('T');
                    const time = fullTime ? fullTime.substring(0, 5) : "00:00";

                    return {
                        id: event.id, // Usamos el ID de Google como ID local también
                        gcalId: event.id,
                        summary: event.summary || 'Cita sin título',
                        date: date,
                        time: time,
                        reminders: event.reminders && event.reminders.overrides 
                            ? event.reminders.overrides.map(o => ({ minutes: o.minutes, label: `${o.minutes} min antes` }))
                            : []
                    };
                }).filter(app => app !== null); // Eliminar registros nulos

                // Fusionar inteligentemente evitando duplicados por gcalId
                googleAppointments.forEach(gApp => {
                    const existe = localAppointments.some(lApp => lApp.gcalId === gApp.gcalId);
                    if (!existe) {
                        localAppointments.push(gApp);
                    }
                });

                // Guardar en el almacenamiento local y refrescar toda la pantalla
                saveAndRefresh();
                console.log(`Sincronizados ${googleAppointments.length} eventos de Google con éxito.`);

            } catch (err) {
                console.error("Error al listar eventos de Google Calendar:", err);
            }
        }

        // Carga inicial de elementos locales
        renderCalendar();
        renderCards();
    </script>
